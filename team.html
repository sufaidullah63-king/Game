<style>
body {
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background: linear-gradient(180deg,#5e2ca5,#6e3bb7,#4b2b7f);
    color:white;
}

.share-container {
    background: rgba(0,0,0,0.4);
    padding: 30px;
    border-radius: 15px;
    text-align:center;
    width:90%;
    max-width:400px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

.share-container h2 {
    margin-bottom:20px;
}

.share-container input {
    width:100%;
    padding:12px 10px;
    border-radius:8px;
    border:none;
    margin-bottom:15px;
    font-size:16px;
    outline:none;
}

.copy-btn {
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#835cf2;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-bottom:20px;
    transition:0.3s;
}

.copy-btn:hover {
    background:#6a1b9a;
}

/* Social Buttons */
.social-share {
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.social-share a {
    flex:1;
    text-decoration:none;
    color:white;
    margin:0 5px;
    padding:10px 0;
    border-radius:8px;
    transition:0.3s;
}

.social-share a i {
    margin-right:8px;
}

.social-share a.facebook { background:#3b5998; }
.social-share a.facebook:hover { background:#2d4373; }

.social-share a.whatsapp { background:#25D366; }
.social-share a.whatsapp:hover { background:#1ebe57; }

.social-share a.twitter { background:#1DA1F2; }
.social-share a.twitter:hover { background:#0d95e8; }

.social-share a.linkedin { background:#0077B5; }
.social-share a.linkedin:hover { background:#005983; }

</style>

/* Sidebar Links */
.nav-links {

.nav-item {

    align-items: center;
    padding: 15px 25px;
    color: white;
    text-decoration: none;
    font-size: 16px;

}

.nav-item:hover {

}

.nav-item i {

    margin-right: 15px;
}

/* ================= OVERLAY ================= */
.overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);

</header>

<!-- ====== OVERLAY ====== -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- ====== SIDEBAR ====== -->
<div class="sidebar" id="sidebar">

    <div class="sidebar-header">
        <div class="logo-container">
            <img src="https://img.icons8.com/color/96/pakistan.png" alt="NexTrust">
        </div>
    </div>

    <div class="nav-links">
        <a href="#" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-dollar-sign"></i> Deposit Logs</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-money-bill-transfer"></i> Withdraw Logs</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-cubes"></i> My Earnings</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-right-left"></i> Transactions</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-users-viewfinder"></i> Referral</a>

            <i class="fa-solid fa-power-off"></i> Log Out

</div>

<!-- ====== SCRIPT ====== -->
<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
}
</script>

<!-- ====== NAVBAR + SIDEBAR SECTION END ====== -->

<div class="share-container">
    <h2>Share This Link</h2>
    <input type="text" id="shareLink" value="https://example.com/your-link" readonly>
    <button class="copy-btn" onclick="copyLink()">Copy Link</button>

    <div class="social-share">
        <a href="#" class="facebook" target="_blank" onclick="shareSocial('facebook')"><i class="fab fa-facebook-f"></i> Facebook</a>
        <a href="#" class="whatsapp" target="_blank" onclick="shareSocial('whatsapp')"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        <a href="#" class="twitter" target="_blank" onclick="shareSocial('twitter')"><i class="fab fa-twitter"></i> Twitter</a>
        <a href="#" class="linkedin" target="_blank" onclick="shareSocial('linkedin')"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
    </div>
</div>

<script>
function copyLink() {
    const copyText = document.getElementById('shareLink');
    copyText.select();
    copyText.setSelectionRange(0, 99999); // For mobile devices
    navigator.clipboard.writeText(copyText.value);
    alert("Link copied to clipboard!");
}

function shareSocial(platform) {
    const url = encodeURIComponent(document.getElementById('shareLink').value);
    let shareUrl = '';

    switch(platform) {
        case 'facebook':
            shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
            break;
        case 'whatsapp':
            shareUrl = `https://wa.me/?text=${url}`;
            break;
        case 'twitter':
            shareUrl = `https://twitter.com/intent/tweet?url=${url}`;
            break;
        case 'linkedin':
            shareUrl = `https://www.linkedin.com/shareArticle?mini=true&url=${url}`;
            break;
    }

    window.open(shareUrl, '_blank');
}
</script>

<style>
/* ===================== */
/* Bottom Navigation CSS */
/* ===================== */

.bottom-nav-container {
    position: fixed;
    bottom: 0;

    width: 100%;

}

.nav-center-btn:active {
    transform: scale(0.9) translateY(5px);
}
</style>
