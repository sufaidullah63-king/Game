<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - NexTrust</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#5e2ca5,#6e3bb7,#4b2b7f);
    color:white;
}

/* Login Card */
.login-card{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    padding:50px 40px;
    border-radius:25px;
    width:90%;
    max-width:400px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    text-align:center;
    transition:0.3s;
}

.login-card:hover{
    transform: scale(1.02);
}

.login-card h2{
    font-size:32px;
    margin-bottom:30px;
    font-weight:700;
    letter-spacing:1px;
    color:#fff;
}

/* Form */
.login-card form{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.input-group{
    position: relative;
}

.input-group input{
    width:100%;
    padding:15px 15px 15px 45px;
    border-radius:15px;
    border:none;
    outline:none;
    font-size:16px;
    background: rgba(255,255,255,0.12);
    color:white;
    transition:0.3s;
}

.input-group input:focus{
    background: rgba(255,255,255,0.25);
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
}

.input-group i{
    position: absolute;
    top:50%;
    left:15px;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.7);
    font-size:18px;
}

/* Button */
.login-card button{
    padding:15px;
    border:none;
    border-radius:15px;
    background: linear-gradient(90deg,#835cf2,#6a1b9a);
    color:white;
    font-size:18px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.login-card button:hover{
    background: linear-gradient(90deg,#6a1b9a,#835cf2);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* Signup link */
.signup-link{
    margin-top:20px;
    font-size:15px;
    opacity:0.85;
}

.signup-link a{
    color:#fff;
    font-weight:600;
    text-decoration:none;
    transition:0.3s;
}

.signup-link a:hover{
    text-decoration:underline;
}

/* Responsive */
@media(max-width:480px){
    .login-card{
        padding:40px 25px;
    }
    .input-group input{
        padding-left:40px;
    }
}
</style>
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <form id="loginForm">
        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="Username" required>
        </div>
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <div class="signup-link">
        Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if(username && password){
        alert(`Welcome ${username}! Redirecting...`);
        window.location.href = 'index.html'; // redirect to main page
    }else{
        alert("Please enter username and password!");
    }
});
</script>

</body>
</html>
